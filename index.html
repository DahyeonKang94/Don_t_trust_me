<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Spirit</title>

.wrap{

.title{
  font-size:23px;
  line-height:1.18;
}

.wifi{
  font-size:24px;
  line-height:1.15;
}

.button{
  display:block;
  text-decoration:none;
  margin-top:14px;
  font-size:29px;
  line-height:1.15;
  padding:24px 16px;
}

.step{
  font-size:22px;
  line-height:1.35;
  margin:22px 20px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="small">SPIRIT NETWORK</div>

<div class="banner title">
DO YOU WANT TO CONNECT<br>
WITH LOCATION SPIRIT?
</div>

<div class="step">
1. Connect to Wi-Fi
</div>

<div class="banner wifi">
DONT_TRUST_ME_
</div>

<div class="step">
2. After connecting,<br>
return to this page.
</div>

</html>
