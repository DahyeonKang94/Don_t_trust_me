<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Spirit</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.wrap{
  max-width:420px;
  padding:30px;
}

h1{
  font-size:48px;
  font-weight:400;
  margin-bottom:24px;
}

p{
  opacity:.8;
  line-height:1.7;
  margin-bottom:32px;
}

.btn{
  display:inline-block;
  border:0;
  border-radius:999px;
  padding:16px 28px;
  font-size:16px;
  background:white;
  color:black;
  text-decoration:none;
}

.small{
  margin-top:38px;
  font-size:14px;
  opacity:.55;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Join the spirit network.</h1>

  <p>
    First, connect to the spirit Wi-Fi.<br>
    Then open the question page.
  </p>

  <a href="javascript:void(0)" onclick="copyWifi()" class="btn">
    Copy Wi-Fi Name
  </a>

  <div class="small">
    Wi-Fi: LocationSpirit_OpenSafari<br>
    After joining, open:<br>
    192.168.4.1
  </div>
</div>

<script>
function copyWifi(){
  navigator.clipboard.writeText("LocationSpirit_OpenSafari");
  alert(
`Wi-Fi name copied.

1. Open iPhone Settings
2. Go to Wi-Fi
3. Join "LocationSpirit_OpenSafari"
4. Return to Safari
5. Open 192.168.4.1 if needed`
  );
}
</script>

</body>
</html>
