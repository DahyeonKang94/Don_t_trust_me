<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Location Spirit</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.wrap{
  max-width:420px;
  padding:30px;
}

h1{
  font-size:48px;
  font-weight:400;
  margin-bottom:24px;
}

p{
  opacity:.8;
  line-height:1.7;
  margin-bottom:32px;
}

button{
  border:0;
  border-radius:999px;
  padding:16px 28px;
  font-size:16px;
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Join the spirit network.</h1>

  <p>
  1. Join the Wi-Fi<br>
  2. Open Safari if needed
  </p>

  <button onclick="joinSpirit()">
    Join Location Spirit
  </button>

  <p style="margin-top:40px;font-size:14px;opacity:.5;">
  Wi-Fi: LocationSpirit_OpenSafari<br>
  Then open 192.168.4.1
  </p>
</div>

<script>
function joinSpirit(){
  window.location.href =
  "WIFI:T:nopass;S:LocationSpirit_OpenSafari;;";
}
</script>

</body>
</html>
